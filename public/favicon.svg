
<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Fundo Sólido (App Icon Background) -->
  <rect width="512" height="512" rx="100" fill="#007749"/>
  
  <!-- Brilho Superior -->
  <path d="M0 100C0 44.7715 44.7715 0 100 0H412C467.228 0 512 44.7715 512 100V256H0V100Z" fill="white" fill-opacity="0.1"/>

  <!-- Globo Terrestre -->
  <circle cx="256" cy="220" r="140" fill="#005a37" stroke="white" stroke-width="8"/>
  
  <!-- Continentes Abstratos -->
  <path d="M200 180C220 160 280 160 300 190C310 210 290 230 280 240C260 260 220 250 200 240C180 220 180 200 200 180Z" fill="#FFB81C"/>
  <path d="M280 200C290 190 310 190 320 200" stroke="#E03C31" stroke-width="6" stroke-linecap="round"/>

  <!-- Avião (Decolando para a direita) -->
  <g transform="translate(320, 160) rotate(-15)">
    <path d="M0 10 L40 0 L0 -10 L-10 0 Z" fill="white"/>
    <path d="M-10 0 L-60 0" stroke="white" stroke-width="4" stroke-dasharray="8 8" opacity="0.6"/>
  </g>

  <!-- Texto GO! Grande e Impactante -->
  <text x="256" y="420" font-family="Arial, sans-serif" font-weight="900" font-size="160" fill="white" text-anchor="middle" letter-spacing="-5" style="filter: drop-shadow(0px 8px 0px rgba(0,0,0,0.3));">
    GO!
  </text>
  
  <!-- Borda decorativa dourada sutil -->
  <rect x="20" y="20" width="472" height="472" rx="80" stroke="#FFB81C" stroke-width="12" stroke-opacity="0.5"/>
</svg>
